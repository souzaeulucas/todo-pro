<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>To-Do Pro</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>📝 To-Do Pro</h1>

    <!-- Input + botão -->
    <div class="input-area">
      <input type="text" id="inputTarefa" placeholder="Digite uma tarefa...">
      <button onclick="adicionarTarefa()">Adicionar</button>
    </div>

    <!-- Filtros -->
    <div class="filtros">
      <button onclick="filtrar('todas')">Todas</button>
      <button onclick="filtrar('pendentes')">Pendentes</button>
      <button onclick="filtrar('concluidas')">Concluídas</button>
    </div>

    <!-- Lista -->
    <ul id="listaTarefas"></ul>

    <!-- Contador -->
    <p id="contador"></p>

  </div>

  <!-- JS -->
  <script src="script.js"></script>

</body>
</html>
